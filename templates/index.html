<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxx-AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 255, 0, 0.2);
        }
        .status.listening {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .chat-box {
            height: 300px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .message {
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
        }
        .user {
            background: #00d4ff;
            color: #000;
            margin-left: auto;
            text-align: right;
        }
        .ai {
            background: #7b2cbf;
            margin-right: auto;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .controls select {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
        }
        .mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Maxx-AI</h1>
        <div class="status" id="status">Ready</div>
        
        <div class="controls">
            <select id="voiceSelect">
                <option value="aura-arcas-en">Arcas (Male)</option>
                <option value="aura-asteria-en">Asteria (Female)</option>
                <option value="aura-hera-en">Hera (Female)</option>
                <option value="aura-zeus-en">Zeus (Male)</option>
            </select>
        </div>
        
        <div class="chat-box" id="chatBox"></div>
        
        <div class="input-area">
            <input type="text" id="textInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendText()">Send</button>
            <button class="mic-btn" id="micBtn" onclick="startVoice()">🎤</button>
        </div>
    </div>

    <script>
        const socket = io();
        const chatBox = document.getElementById('chatBox');
        const status = document.getElementById('status');
        const textInput = document.getElementById('textInput');
        const micBtn = document.getElementById('micBtn');

        socket.on('connect', () => {
            status.textContent = 'Connected';
            status.classList.remove('listening');
        });

        socket.on('user_message', (data) => {
            addMessage(data.text, 'user');
        });

        socket.on('ai_response', (data) => {
            addMessage(data.text, 'ai');
            status.textContent = 'Ready';
            status.classList.remove('listening');
            textInput.disabled = false;
            micBtn.disabled = false;
        });

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendText() {
            const text = textInput.value.trim();
            if (text) {
                socket.emit('text_input', { text: text });
                textInput.value = '';
            }
        }

        function startVoice() {
            status.textContent = 'Listening...';
            status.classList.add('listening');
            textInput.disabled = true;
            micBtn.disabled = true;
            socket.emit('voice_input', {});
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendText();
            }
        }
    </script>
</body>
</html>
